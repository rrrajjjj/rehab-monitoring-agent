<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eodyne Systems — Rehabilitation Monitoring</title>
  <link rel="stylesheet" href="/static/styles.css?v=8">
  <style>
    .landing {
      max-width: 720px;
      margin: 4rem auto;
      padding: 0 1.5rem;
    }
    .landing h1 { font-size: 1.6rem; margin: 0 0 0.25rem; }
    .landing .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      display: block;
      margin-bottom: 2.5rem;
    }
    .landing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .landing-card {
      display: block;
      padding: 1.25rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
    }
    .landing-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .landing-card h2 { font-size: 1rem; margin: 0 0 0.35rem; color: var(--accent); }
    .landing-card p { margin: 0; font-size: 0.85rem; color: var(--text-muted); line-height: 1.45; }
  </style>
</head>
<body>
  <div class="landing">
    <h1>Eodyne Systems</h1>
    <span class="subtitle">Rehabilitation Monitoring</span>
    <div class="landing-grid">
      <a class="landing-card" href="/demo">
        <h2>Demo</h2>
        <p>Curated clinician-view and patient-view cards for a fixed cohort.</p>
      </a>
      <a class="landing-card" href="/all">
        <h2>All patients</h2>
        <p>Generate a triage card for any patient and week on demand.</p>
      </a>
      <a class="landing-card" href="/ops">
        <h2>Ops</h2>
        <p>Prompts, models, and knowledge-base management.</p>
      </a>
    </div>
  </div>
</body>
</html>
