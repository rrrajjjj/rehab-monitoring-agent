<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eodyne Systems — Rehabilitation Monitoring</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Eodyne Systems</h1>
      <span class="subtitle">Rehabilitation Monitoring</span>
    </header>

    <main class="main">
      <!-- Page 1: Patient list only -->
      <section id="page-list" class="page page-list">
        <h2>Patients</h2>
        <ul id="patient-list" class="patient-list-items"></ul>
      </section>

      <!-- Page 2: Patient detail - two panes -->
      <section id="page-detail" class="page page-detail hidden">
        <button type="button" id="back-btn" class="back-btn">← Back to patients</button>
        <div id="week-tabs-bar" class="week-tabs-bar"></div>
        <div class="two-pane">
          <aside class="observations-pane">
            <h3>Observations</h3>
            <p class="hint">Click an observation to view its evidence plots.</p>
            <div id="observation-cards" class="observation-cards"></div>
          </aside>
          <section class="plots-pane">
            <h3>Evidence</h3>
            <div id="metrics-plots" class="metrics-plots"></div>
          </section>
        </div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
